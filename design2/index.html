.card-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(96,165,250,0.1);color:#60a5fa;margin-left:auto}
.card-desc{font-size:13px;color:#5a8ab5;line-height:1.6;margin-bottom:16px}

.card-footer{display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid #0f2744}
.card-link{padding:8px 16px;border-radius:8px;background:#0f1e35;text-align:center;font-size:13px;font-weight:600;flex:1;transition:all .3s}

.card-link.product{color:#7dd3fc;border:1px solid rgba(125,211,252,0.25)}
.card-link:hover{transform:translateY(-2px)}

function renderGrid(filter){
  const grid=document.getElementById('productGrid');
  grid.innerHTML='';
  products.filter(p=>filter==='all'||p.tag===filter).forEach(p=>{
    const card=document.createElement('a');
    card.className='card';
    card.href=p.product;
    card.innerHTML=`<div class="card-top"><div class="card-icon" style="background:${p.color}22;color:${p.color}">${p.icon}</div><div class="card-name">${p.name}</div><span class="card-tag">${p.tag}</span></div><p class="card-desc">${p.desc}</p><div class="card-features">${p.features.map(f=>`<span class="card-feat">${f}</span>`).join('')}</div><div class="card-footer"><a href="${p.demo}" class="card-link demo" target="_blank">🔬 演示</a><a href="${p.product}" class="card-link product" target="_blank">📄 产品页</a></div>`;
    grid.appendChild(card);
  });
}
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });
});
renderGrid('all');
