<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矩阵通 - 自媒体矩阵运营系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1c;--card:#111827;--border:#1f2937;--primary:#60a5fa;--accent:#38bdf8;--text:#f9fafb;--muted:#9ca3af;--green:#34d399;--amber:#fbbf24;--red:#f87171;--purple:#a78bfa}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:230px;background:#0d1421;border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto}
.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.sidebar-nav{flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:#1a2332;color:var(--primary);border-left-color:var(--primary)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.badge{background:var(--primary);color:#000;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto}
.badge.red{background:var(--red)}
.main{flex:1;margin-left:230px;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#0d1421;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:16px}
.demo-badge{background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600}
.search-box{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;gap:8px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:200px}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer}
.content{padding:24px;overflow-y:auto;flex:1}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .3s}
.panel:hover{border-color:var(--primary);transform:translateY(-2px)}
.panel-num{font-size:28px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel-label{font-size:12px;color:var(--muted);margin-top:4px}
.panel-sub{font-size:11px;color:var(--green);margin-top:6px}
.panel-sub.red{color:var(--red)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.tab-bar{display:flex;gap:4px;background:#0d1421;border-radius:8px;padding:4px;margin-bottom:16px}
.tab{padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;border-radius:6px;transition:all .2s}
.tab.active{background:var(--primary);color:#000;font-weight:600}
.table-wrp{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:#1a2332}
.status{font-size:11px;padding:2px 8px;border-radius:10px}
.status.run{color:var(--green);background:rgba(52,211,153,.15)}
.status.warn{color:var(--amber);background:rgba(251,191,36,.15)}
.status.err{color:var(--red);background:rgba(248,113,113,.15)}
.status.info{color:var(--primary);background:rgba(96,165,250,.15)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(96,165,250,.15);color:var(--primary);margin-right:4px}
.tag.purple{background:rgba(167,139,250,.15);color:var(--purple)}
.tag.green{background:rgba(52,211,153,.15);color:var(--green)}
.tag.amber{background:rgba(251,191,36,.15);color:var(--amber)}
.tag.red{background:rgba(248,113,113,.15);color:var(--red)}
.progress-bar{height:4px;background:#1a2332;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width .8s ease}
.flex-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--primary);color:#000}
.btn-primary:hover{background:var(--accent)}
.btn-outline{border:1px solid var(--border);color:var(--muted);background:none}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.form-item label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-item input,.form-item select,.form-item textarea{width:100%;padding:8px 12px;background:#0d1421;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border .2s;resize:none}
.form-item input:focus,.form-item select:focus,.form-item textarea:focus{border-color:var(--primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:640px;max-width:90vw;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.grid-2{grid-template-columns:1fr 1fr;gap:16px;display:grid}
.grid-3{grid-template-columns:repeat(3,1fr);gap:16px;display:grid}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.list-item .icon-circle{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:rgba(96,165,250,.15)}
.list-item .info{flex:1}
.list-item .title{font-size:13px;font-weight:600}
.list-item .desc{font-size:11px;color:var(--muted);margin-top:2px}
.account-card{background:#0d1421;border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.account-card:hover{border-color:var(--primary);transform:translateY(-1px)}
.account-card .avatar{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.account-card .info{flex:1;min-width:0}
.account-card .name{font-size:13px;font-weight:600}
.account-card .meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px}
.account-card .stat{text-align:right}
.account-card .stat-num{font-size:15px;font-weight:700;color:var(--primary)}
.account-card .stat-label{font-size:10px;color:var(--muted)}
.chart-box{height:180px;background:linear-gradient(135deg,#0d1421,#11192b);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;position:relative;overflow:hidden;padding:16px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
.dot.green{background:var(--green)}
.dot.amber{background:var(--amber)}
.dot.red{background:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;width:24px;height:24px;animation:spin .8s linear infinite}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.calendar-grid .day-header{font-size:11px;color:var(--muted);padding:4px}
.calendar-grid .day{font-size:12px;padding:8px 4px;border-radius:6px;cursor:pointer;transition:all .2s}
.calendar-grid .day:hover{background:#1a2332}
.calendar-grid .day.today{border:1px solid var(--primary);color:var(--primary)}
.calendar-grid .day.event{background:rgba(96,165,250,.15);color:var(--primary)}
.platform-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.platform-tag.douyin{background:rgba(255,0,80,.2);color:#ff0050}
.platform-tag.kuaishou{background:rgba(255,150,0,.2);color:#ff9600}
.platform-tag.xiaohongshu{background:rgba(255,0,0,.2);color:#ff0000}
.platform-tag.weixins{background:rgba(0,200,100,.2);color:#00c864}
.platform-tag.weibo{background:rgba(255,100,0,.2);color:#ff6400}
.skill-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.skill-bar .label{font-size:11px;color:var(--muted);width:60px}
.skill-bar .bar{flex:1;height:4px;background:#1a2332;border-radius:2px}
.skill-bar .fill{height:100%;border-radius:2px}
.heatmap{display:grid;grid-template-columns:repeat(24,1fr);gap:2px}
.heatmap-cell{height:16px;border-radius:2px;opacity:.6;cursor:pointer;transition:opacity .2s}
.heatmap-cell:hover{opacity:1}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><h1>📊 矩阵通</h1><span>自媒体矩阵运营系统 · 演示版</span></div>
  <div class="sidebar-nav">
    <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="icon">📊</span>数据概览</div>
    <div class="nav-item" onclick="showPage('accounts',this)"><span class="icon">📱</span>账号矩阵</div>
    <div class="nav-item" onclick="showPage('content',this)"><span class="icon">✍️</span>内容管理</div>
    <div class="nav-item" onclick="showPage('calendar',this)"><span class="icon">📅</span>发布日历</div>
    <div class="nav-item" onclick="showPage('comment',this)"><span class="icon">💬</span>评论私信 <span class="badge red">28</span></div>

    <div class="nav-item" onclick="showPage('ai',this)"><span class="icon">🤖</span>AI助手</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h2>数据概览</h2>
    <div class="topbar-right">
      <div class="search-box">🔍 <input placeholder="搜索账号/内容/话题…"></div>
      <span class="demo-badge">🔬 功能演示</span>
      <div class="topbar-avatar">M</div>
    </div>
  </div>
  <div class="content" id="pageContent"></div>
</div>
<script>
const mockData={
  accounts:[
    {id:1,platform:'douyin',name:'生活小妙招',avatar:'🎬',fans:125800,views:890000,likes:45600,posts:328,status:'active',todayViews:12500,weekTrend:12.5},
    {id:2,platform:'xiaohongshu',name:'精致生活家',avatar:'💄',fans:89200,views:520000,likes:32100,posts:215,status:'active',todayViews:8200,weekTrend:8.3},
    {id:3,platform:'kuaishou',name:'搞笑集中营',avatar:'😂',fans:256000,views:1200000,likes:89000,posts:456,status:'active',todayViews:28000,weekTrend:-2.1},
    {id:4,platform:'weixins',name:'职场充电站',avatar:'💼',fans:45000,views:180000,likes:12000,posts:128,status:'active',todayViews:3200,weekTrend:15.7},

    {id:2,title:'职场新人必看的5个沟通技巧',account:'职场充电站',platform:'weixins',type:'职场',views:45600,likes:3200,comments:234,shares:890,fav:1100,status:'published',time:'今天 10:20',duration:'3:12'},
    {id:3,title:'这款面霜让我皮肤年轻了10岁',account:'精致生活家',platform:'xiaohongshu',type:'美妆',views:89000,likes:7800,comments:567,shares:340,fav:4500,status:'published',time:'昨天 18:45',duration:'1:58'},
    {id:4,title:'程序员自嘲视频合集，笑喷了',account:'搞笑集中营',platform:'kuaishou',type:'搞笑',views:256000,likes:18900,comments:1200,shares:3400,fav:8900,status:'published',time:'昨天 12:00',duration:'4:20'},
    {id:5,title:'2024年最值得入手的科技产品',account:'科技前沿',platform:'weibo',type:'科技',views:0,likes:0,comments:0,shares:0,fav:0,status:'draft',time:'草稿',duration:''},
    {id:6,title:'夏日清爽穿搭指南 | 一周不重样',account:'精致生活家',platform:'xiaohongshu',type:'时尚',views:0,likes:0,comments:0,shares:0,fav:0,status:'scheduled',time:'明天 20:00',duration:'2:15'},
  ],
  comments:[

    {id:3,user:'抖音粉丝123456',platform:'douyin',content:'哈哈哈哈笑死我了',time:'30分钟前',account:'生活小妙招',reply:'哈哈喜欢就好～',like:12},
    {id:4,user:'科技迷',platform:'weibo',content:'这篇分析很到位，期待下期',time:'1小时前',account:'科技前沿',reply:'',like:89},

    {id:3,user:'王小红',platform:'xiaohongshu',content:'已下单，期待效果',time:'1小时前',account:'精致生活家',unread:false},

  analytics:{labels:['周一','周二','周三','周四','周五','周六','周日'],views:[125,98,145,167,132,198,245],likes:[12,8,15,18,14,22,28],fans:[+230,+180,+320,+280,+410,+520,+680]},
  fanProfile:{male:42,female:58,age18_24:25,age25_34:45,age35_44:20,age45:10,city1:'北京',city2:'上海',city3:'广州',city4:'深圳',city5:'杭州'},
  revenue:{month:386500,trend:15.8,pending:42000,withdrawn:280000,bank:64500}
};

let currentPage='dashboard';
function showPage(page,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.closest('.nav-item').classList.add('active');
  const titles={dashboard:'数据概览',accounts:'账号矩阵',content:'内容管理',calendar:'发布日历',comment:'评论私信',analytics:'数据分析',fan:'粉丝画像',revenue:'收益管理',team:'团队协作',ai:'AI助手'};
  document.querySelector('.topbar h2').textContent=titles[page];
  const c=document.getElementById('pageContent');
  switch(page){
    case 'dashboard':c.innerHTML=renderDashboard();break;
    case 'accounts':c.innerHTML=renderAccounts();break;
    case 'content':c.innerHTML=renderContent();break;
    case 'calendar':c.innerHTML=renderCalendar();break;
    case 'comment':c.innerHTML=renderComment();break;
    case 'analytics':c.innerHTML=renderAnalytics();break;
    case 'fan':c.innerHTML=renderFan();break;
    case 'revenue':c.innerHTML=renderRevenue();break;
    case 'team':c.innerHTML=renderTeam();break;
    case 'ai':c.innerHTML=renderAI();break;
  }
}

function renderDashboard(){
  const totalFans=mockData.accounts.reduce((s,a)=>s+a.fans,0);
  const totalViews=mockData.accounts.reduce((s,a)=>s+a.views,0);
  const totalPosts=mockData.accounts.reduce((s,a)=>s+a.posts,0);
  const activeAccounts=mockData.accounts.filter(a=>a.status==='active').length;
  const todayTotalViews=mockData.accounts.reduce((s,a)=>s+a.todayViews,0);
  return `<div class="panel-grid">
    <div class="panel"><div class="panel-num">${(totalFans/10000).toFixed(1)}万</div><div class="panel-label">总粉丝数</div><div class="panel-sub">↑ 12.5% 本周增长</div></div>
    <div class="panel"><div class="panel-num">${(totalViews/10000).toFixed(1)}万</div><div class="panel-label">总播放量</div><div class="panel-sub">今日 ${(todayTotalViews/10000).toFixed(1)}万</div></div>
    <div class="panel"><div class="panel-num">${totalPosts}</div><div class="panel-label">总内容数</div><div class="panel-sub">本月新增 28 篇</div></div>
    <div class="panel"><div class="panel-num">${activeAccounts}/${mockData.accounts.length}</div><div class="panel-label">活跃账号</div><div class="panel-sub" style="color:var(--green)">● 正常运营</div></div>
  </div>
  <div class="grid-2">
    <div class="card"><div class="card-header"><span class="card-title">📈 传播趋势(7天)</span><div class="tab-bar" style="margin:0"><span class="tab active">播放</span><span class="tab">点赞</span><span class="tab">粉丝</span></div></div>
      <div class="chart-box">${renderBarChart(mockData.analytics)}</div>
    </div>
    <div class="card"><div class="card-header"><span class="card-title">🔥 热门内容 TOP3</span></div>
      ${mockData.contents.filter(c=>c.status==='published').sort((a,b)=>b.views-a.views).slice(0,3).map((c,i)=>`<div class="list-item">
        <div class="icon-circle" style="background:${['rgba(255,0,80,.15)','rgba(255,150,0,.15)','rgba(255,0,0,.15)'][i]}">${['🏆','🥈','🥉'][i]}</div>
        <div class="info"><div class="title">${c.title}</div><div class="desc">${c.account} · ${c.platform==='douyin'?'抖音':c.platform==='xiaohongshu'?'小红书':c.platform==='kuaishou'?'快手':c.platform==='weixins'?'视频号':'微博'}</div></div>
        <div style="text-align:right"><div style="font-size:14px;font-weight:700;color:var(--primary)">${(c.views/10000).toFixed(1)}万</div><div style="font-size:10px;color:var(--muted)">播放</div></div>
      </div>`).join('')}
    </div>
  </div>
  <div class="grid-2" style="margin-top:16px">
    <div class="card"><div class="card-header"><span class="card-title">📱 账号矩阵概览</span><button class="btn btn-outline" style="font-size:11px;padding:4px 10px">管理账号</button></div>
