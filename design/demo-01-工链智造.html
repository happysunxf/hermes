<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工链智造 - 小作坊MES系统演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1c;--card:#111827;--border:#1f2937;--primary:#60a5fa;--accent:#38bdf8;--text:#f9fafb;--muted:#9ca3af;--green:#34d399;--amber:#fbbf24;--red:#f87171}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.sidebar{width:220px;background:#0d1421;border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;display:flex;flex-direction:column}
.logo{padding:0 20px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.logo h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.sidebar-nav{flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{background:#1a2332;color:var(--primary);border-left-color:var(--primary)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.badge{background:var(--primary);color:#000;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto}
.badge.warn{background:var(--amber);color:#000}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#0d1421;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:16px}
.demo-badge{background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600}
.search-box{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;gap:8px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:200px}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.content{padding:24px;overflow-y:auto;flex:1}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .3s}
.panel:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(96,165,250,.1)}
.panel-num{font-size:32px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel-label{font-size:12px;color:var(--muted);margin-top:4px}
.panel-sub{font-size:11px;color:var(--green);margin-top:8px}
.panel-sub.warn{color:var(--amber)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600}
.tab-bar{display:flex;gap:4px;background:#0d1421;border-radius:8px;padding:4px;margin-bottom:16px}
.tab{padding:6px 16px;font-size:12px;color:var(--muted);cursor:pointer;border-radius:6px;transition:all .2s}
.tab.active{background:var(--primary);color:#000;font-weight:600}
.chart-box{height:200px;background:linear-gradient(135deg,#0d1421,#11192b);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;position:relative;overflow:hidden}
.chart-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(96,165,250,.05),rgba(56,189,248,.05))}
.progress-bar{height:6px;background:#1a2332;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width 1s ease}
.table-wrp{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
tr:hover td{background:#1a2332}
.status{font-size:11px;padding:2px 8px;border-radius:10px;background:#1a2332}
.status.run{color:var(--green);border:1px solid rgba(52,211,153,.3)}
.status.warn{color:var(--amber);border:1px solid rgba(251,191,36,.3)}
.status.err{color:var(--red);border:1px solid rgba(248,113,113,.3)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.form-item label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-item input,.form-item select{width:100%;padding:8px 12px;background:#0d1421;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.form-item input:focus,.form-item select:focus{border-color:var(--primary)}
.btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--primary);color:#000}
.btn-primary:hover{background:var(--accent)}
.btn-outline{border:1px solid var(--border);color:var(--muted);background:none}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.flex-row{display:flex;gap:8px;flex-wrap:wrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:640px;max-width:90vw;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(96,165,250,.15);color:var(--primary);margin-right:4px}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:16px}
.timeline-item::before{content:'';position:absolute;left:-17px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--primary)}
.timeline-item .time{font-size:11px;color:var(--muted)}
.timeline-item .text{font-size:13px;margin-top:2px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;width:24px;height:24px;animation:spin .8s linear infinite}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border-bottom:none}
.list-item .icon-circle{width:36px;height:36px;border-radius:8px;background:rgba(96,165,250,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.list-item .info{flex:1}
.list-item .title{font-size:13px;font-weight:600}
.list-item .desc{font-size:11px;color:var(--muted);margin-top:2px}
.list-item .value{font-size:13px;font-weight:700;color:var(--primary);text-align:right}
.list-item .value.warn{color:var(--amber)}
.skill-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.skill-bar .label{font-size:11px;color:var(--muted);width:60px}
.skill-bar .bar{flex:1;height:4px;background:#1a2332;border-radius:2px}
.skill-bar .fill{height:100%;border-radius:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
.alert-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:8px;margin-bottom:16px;font-size:13px;color:var(--amber)}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><h1>🏭 工链智造</h1><span>小作坊MES系统 · 演示版</span></div>
  <div class="sidebar-nav">
    <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="icon">📊</span>生产看板</div>
    <div class="nav-item" onclick="showPage('order',this)"><span class="icon">📋</span>工单管理</div>
    <div class="nav-item" onclick="showPage('device',this)"><span class="icon">⚙️</span>设备监控 <span class="badge warn">2</span></div>
    <div class="nav-item" onclick="showPage('quality',this)"><span class="icon">🔍</span>质检管理</div>
    <div class="nav-item" onclick="showPage('inventory',this)"><span class="icon">📦</span>库存物料</div>
    <div class="nav-item" onclick="showPage('worker',this)"><span class="icon">👷</span>人员工时</div>
    <div class="nav-item" onclick="showPage('chart',this)"><span class="icon">📈</span>统计报表</div>
    <div class="nav-item" onclick="showPage('alert',this)"><span class="icon">🔔</span>报警中心 <span class="badge">3</span></div>
    <div class="nav-item" onclick="showPage('settings',this)"><span class="icon">⚙️</span>系统设置</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h2>生产看板</h2>
    <div class="topbar-right">
      <div class="search-box">🔍 <input placeholder="搜索工单/设备/人员…"></div>
      <span class="demo-badge">🔬 功能演示</span>
      <div class="topbar-avatar">张</div>
    </div>
  </div>
  <div class="content" id="pageContent"></div>
</div>
<script>
const mockData={
  orders:[
    {id:'WO20250601',product:'精密轴承套筒A型',quantity:1200,completed:960,status:'running',priority:'高',due:'2025-06-03',equip:'数控车床-01',worker:'李师傅'},
    {id:'WO20250602',product:'阀体法兰盘',quantity:800,completed:300,status:'running',priority:'中',due:'2025-06-05',equip:'数控车床-02',worker:'王工'},
    {id:'WO20250603',product:'减速机箱体',quantity:350,completed:350,status:'done',priority:'高',due:'2025-05-30',equip:'加工中心-01',worker:'张班'},
    {id:'WO20250604',product:'液压杆连接件',quantity:2000,completed:0,status:'pending',priority:'低',due:'2025-06-10',equip:'待排产',worker:'待分配'},
    {id:'WO20250605',product:'齿轮轴组件',quantity:600,completed:200,status:'running',priority:'高',due:'2025-06-04',equip:'数控车床-03',worker:'刘师傅'},
  ],
  devices:[
    {id:'D001',name:'数控车床-01',status:'run',temp:68,tpm:95,power:92,uptime:48.5,memos:['主轴温度正常','润滑油量充足']},
    {id:'D002',name:'数控车床-02',status:'run',temp:72,tpm:88,power:85,uptime:36.2,memos:['冷却系统正常','刀片寿命剩余30%']},
    {id:'D003',name:'数控车床-03',status:'warn',temp:85,tpm:72,power:95,uptime:12.3,memos:['⚠️主轴温度偏高','建议更换刀片']},
    {id:'D004',name:'加工中心-01',status:'run',temp:65,tpm:98,power:88,uptime:55.8,memos:['各项指标正常']},
    {id:'D005',name:'线切割机-01',status:'idle',temp:45,tpm:100,power:12,uptime:8.5,memos:['待机中']},
    {id:'D006',name:'激光切割机',status:'err',temp:95,tpm:45,power:99,uptime:2.1,memos:['⚠️设备故障停机','⚠️镜片温度异常']},
  ],
  quality:[
    {id:'Q20250601',order:'WO20250601',item:'外径尺寸',standard:'25.0±0.05',actual:['25.01','24.99','25.02','25.00'],rate:99.2,result:'pass',inspector:'质检员-赵'},
    {id:'Q20250602',order:'WO20250601',item:'内孔精度',standard:'20.0±0.03',actual:['20.01','19.99','20.00'],rate:98.8,result:'pass',inspector:'质检员-赵'},
    {id:'Q20250603',order:'WO20250602',item:'表面粗糙度',standard:'Ra1.6',actual:['Ra1.5','Ra1.7','Ra1.6'],rate:97.5,result:'pass',inspector:'质检员-钱'},
    {id:'Q20250604',order:'WO20250603',item:'形位公差',standard:'0.03mm',actual:['0.025','0.028','0.031'],rate:95.0,result:'warn',inspector:'质检员-孙'},
  ],
  inventory:[
    {code:'MAT-001',name:'45#圆钢',spec:'Φ30×2000mm',stock:2500,unit:'kg',safe:1000,price:8.5,supplier:'上海钢铁',last:'2025-05-28'},
    {code:'MAT-002',name:'304不锈钢板',spec:'2.0×1000×2000mm',stock:800,unit:'张',safe:200,price:320,supplier:'宝钢材料',last:'2025-05-25'},
    {code:'MAT-003',name:'铜套',spec:'Φ25×35mm',stock:450,unit:'个',safe:100,price:12,supplier:'温州铜业',last:'2025-05-20'},
    {code:'MAT-004',name:'轴承',spec:'6205-2RS',stock:200,unit:'套',safe:50,price:45,supplier:'哈尔滨轴承',last:'2025-05-18'},
    {code:'MAT-005',name:'润滑油',spec:'68#抗磨液压油',stock:120,unit:'桶',safe:30,price:280,supplier:'壳牌中国',last:'2025-05-15'},
  ],
  workers:[
    {name:'李师傅',dept:'车加工组',day:[8.5,7.5,8.0,0,8.5,8.0,0],eff:98.5,order:'WO20250601'},
    {name:'王工',dept:'车加工组',day:[7.0,8.0,8.5,8.0,0,7.5,0],eff:92.3,order:'WO20250602'},
    {name:'张班',dept:'加工中心组',day:[8.0,8.0,7.5,8.5,8.0,7.0,0],eff:95.8,order:'WO20250603'},
    {name:'刘师傅',dept:'车加工组',day:[8.5,0,7.5,8.0,8.5,8.0,0],eff:97.2,order:'WO20250605'},
    {name:'陈工',dept:'质检组',day:[8.0,8.0,8.0,8.0,8.0,7.5,0],eff:99.0,order:'多工单'},
  ],
  alerts:[
    {time:'10:32',type:'warn',device:'数控车床-03',msg:'主轴温度超过警戒值85°C，当前87°C'},
    {time:'09:15',type:'err',device:'激光切割机',msg:'设备故障停机，镜片校准失败'},
    {time:'昨天 18:42',type:'info',device:'加工中心-01',msg:'当日生产完成，工单WO20250603已结案'},
    {time:'昨天 16:30',type:'warn',device:'数控车床-02',msg:'刀片寿命低于30%，建议更换'},
  ],
  chartData:{labels:['周一','周二','周三','周四','周五','周六','周日'],values:[85,92,88,95,91,78,65],colors:['#60a5fa','#a78bfa','#60a5fa','#38bdf8','#60a5fa','#a78bfa','#9ca3af']}
};

function showPage(page,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.closest('.nav-item').classList.add('active');
  document.querySelector('.topbar h2').textContent={dashboard:'生产看板',order:'工单管理',device:'设备监控',quality:'质检管理',inventory:'库存物料',worker:'人员工时',chart:'统计报表',alert:'报警中心',settings:'系统设置'}[page];
  const content=document.getElementById('pageContent');
  switch(page){
    case 'dashboard': content.innerHTML=renderDashboard();break;
    case 'order': content.innerHTML=renderOrder();break;
    case 'device': content.innerHTML=renderDevice();break;
    case 'quality': content.innerHTML=renderQuality();break;
    case 'inventory': content.innerHTML=renderInventory();break;
    case 'worker': content.innerHTML=renderWorker();break;
    case 'chart': content.innerHTML=renderChart();break;
    case 'alert': content.innerHTML=renderAlert();break;
    case 'settings': content.innerHTML=renderSettings();break;
  }
}

function renderDashboard(){
  const d=mockData;
  const effRate=(d.workers.reduce((s,w)=>s+w.eff,0)/d.workers.length).toFixed(1);
  const runCount=d.devices.filter(x=>x.status==='run').length;
  const todayOutput=d.orders.filter(x=>x.status!=='pending').reduce((s,o)=>s+o.completed,0);
  const passRate=(d.quality.reduce((s,q)=>s+q.rate,0)/d.quality.length).toFixed(1);
  return `<div class="alert-bar"><span>⚠️</span> 当前生产时段：白班(08:00-20:00) · 数控车床-03主轴温度报警 · 待处理工单3个</div>
  <div class="panel-grid">
    <div class="panel"><div class="panel-num">${todayOutput.toLocaleString()}</div><div class="panel-label">今日产出(件)</div><div class="panel-sub">↑ 12.5% 较昨日</div></div>
    <div class="panel"><div class="panel-num">${effRate}%</div><div class="panel-label">人均效率</div><div class="panel-sub">目标 95%</div></div>
    <div class="panel"><div class="panel-num">${runCount}/${d.devices.length}</div><div class="panel-label">设备运转中</div><div class="panel-sub">异常 ${d.devices.filter(x=>x.status==='err'||x.status==='warn').length} 台</div></div>
    <div class="panel"><div class="panel-num">${passRate}%</div><div class="panel-label">质检合格率</div><div class="panel-sub">目标 98%</div></div>
  </div>
  <div class="grid-2">
    <div class="card"><div class="card-header"><span class="card-title">📋 进行中的工单</span><button class="btn btn-outline" onclick="showModal('newOrder')">+ 新建工单</button></div>
      <div class="table-wrp"><table><thead><tr><th>工单号</th><th>产品</th><th>进度</th><th>设备</th><th>状态</th><th>操作</th></tr></thead><tbody>
        ${d.orders.map(o=>`<tr><td>${o.id}</td><td>${o.product}</td><td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:80px"><div class="progress-fill" style="width:${Math.round(o.completed/o.quantity*100)}%"></div></div><span style="font-size:11px;color:var(--muted)">${Math.round(o.completed/o.quantity*100)}%</span></div></td><td>${o.equip}</td><td><span class="status ${o.status==='done'?'run':o.status==='running'?'warn':''}">${o.status==='done'?'已完成':o.status==='running'?'进行中':'待排产'}</span></td><td><button class="btn btn-outline" style="padding:4px 8px;font-size:11px">详情</button></td></tr>`).join('')}
      </tbody></table></div>
    </div>
    <div class="card"><div class="card-header"><span class="card-title">📈 七日产量趋势</span><div class="tab-bar" style="margin:0"><span class="tab active">产量</span><span class="tab">效率</span><span class="tab">良率</span></div></div>
      <div class="chart-box"><div style="width:100%;padding:16px">${renderBarChart(mockData.chartData)}</div></div>
    </div>
  </div>
  <div class="grid-2" style="margin-top:16px">
    <div class="card"><div class="card-header"><span class="card-title">🔔 实时报警</span><span class="status warn" style="font-size:11px">${d.alerts.filter(x=>x.type!=='info').length} 条待处理</span></div>
      ${d.alerts.slice(0,3).map(a=>`<div class="list-item"><div class="icon-circle">${a.type==='err'?'🔴':a.type==='warn'?'🟡':'ℹ️'}</div><div class="info"><div class="title">${a.device}</div><div class="desc">${a.msg} · ${a.time}</div></div></div>`).join('')}
    </div>
    <div class="card"><div class="card-header"><span class="card-title">📦 库存预警</span></div>
      ${d.inventory.filter(i=>i.stock<i.safe*1.5).map(i=>`<div class="list-item"><div class="icon-circle">⚠️</div><div class="info"><div class="title">${i.name}</div><div class="desc">当前 ${i.stock}${i.unit} · 安全库存 ${i.safe}${i.unit}</div></div><div class="value warn">${Math.round(i.stock/i.safe*100)}%</div></div>`).join('')}
    </div>
  </div>`;
}

function renderBarChart(data){
  const max=Math.max(...data.values);
  return `<div style="display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 8px">
    ${data.labels.map((l,i)=>`<div style="flex:1;text-align:center">
      <div style="height:${Math.round(data.values[i]/max*140)}px;background:${data.colors[i]};border-radius:4px 4px 0 0"></div>
      <div style="font-size:10px;color:var(--muted)">${l}</div><div style="font-size:10px;color:var(--primary);font-weight:600">${data.values[i]}</div>
    </div>`).join('')}
  </div>`;
}

function renderOrder(){
  return `<div class="card" style="margin-bottom:16px">
    <div class="form-grid">

  modal.className='modal-overlay';
  modal.onclick=(e)=>{if(e.target===modal)modal.remove();};
  if(type==='newOrder'){
    modal.innerHTML=`<div class="modal"><div class="modal-header"><span class="modal-title">📋 新建工单</span><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button></div>
      <div class="form-grid"><div class="form-item" style="grid-column:1/-1"><label>产品名称</label><input placeholder="请输入产品名称"></div></div>
      <div class="form-grid"><div class="form-item"><label>计划数量</label><input type="number" placeholder="0"></div><div class="form-item"><label>优先级</label><select><option>高</option><option>中</option><option>低</option></select></div></div>

      <div class="form-grid"><div class="form-item"><label>交期</label><input type="date"></div><div class="form-item"><label>工艺路线</label><select><option>车加工 → 铣削 → 研磨 → 检验</option><option>车加工 → 铣削 → 检验</option><option>激光切割 → 折弯 → 焊接 → 检验</option></select></div></div>
      <div class="form-item" style="margin-top:8px"><label>备注</label><textarea style="width:100%;padding:8px;background:#0d1421;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;height:60px;resize:none" placeholder="特殊要求或说明…"></textarea></div>
      <div class="flex-row" style="margin-top:16px"><button class="btn btn-primary">创建工单</button><button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">取消</button></div>
    </div>`;
  }
  document.body.appendChild(modal);
}
